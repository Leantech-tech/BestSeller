<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Painel Administrativo</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/favion.jpg">
    <link rel="stylesheet" href="css/all.min.css">
    <style>
        :root {
            --teal: #0d9488;
            --teal-dark: #0f766e;
            --teal-light: #14b8a6;
            --verde: #00a651;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --slate-900: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--slate-900);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de fundo sofisticado */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 30%, rgba(13, 148, 136, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 166, 81, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(30, 41, 59, 0.5) 0%, transparent 60%);
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 1rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow:
                0 1px 2px rgba(0, 0, 0, 0.05),
                0 4px 8px rgba(0, 0, 0, 0.05),
                0 12px 24px rgba(0, 0, 0, 0.08),
                0 24px 48px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--teal) 0%, var(--verde) 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            box-shadow: 0 8px 20px rgba(13, 148, 136, 0.25);
        }

        .login-logo-icon i {
            font-size: 1.75rem;
            color: white;
        }

        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--slate-800);
            letter-spacing: -0.5px;
            margin-bottom: 0.35rem;
        }

        .login-header p {
            color: var(--slate-500);
            font-size: 0.95rem;
            font-weight: 400;
        }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.75rem;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--slate-200);
        }

        .login-divider span {
            font-size: 0.75rem;
            color: var(--slate-400);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .login-grupo {
            margin-bottom: 1.25rem;
        }

        .login-grupo label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--slate-700);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-input-wrapper {
            position: relative;
        }

        .login-input-wrapper i {
            position: absolute;
            left: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate-400);
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .login-input {
            width: 100%;
            padding: 0.9rem 2.8rem 0.9rem 2.8rem;
            border: 2px solid var(--slate-200);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s ease;
            background: var(--slate-50);
            color: var(--slate-800);
        }

        .login-input::placeholder {
            color: var(--slate-400);
        }

        .login-input:focus {
            outline: none;
            border-color: var(--teal);
            background: white;
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1);
        }

        .login-input:focus + i,
        .login-input-wrapper:focus-within i:first-child {
            color: var(--teal);
        }

        .login-input-wrapper .login-toggle-senha {
            position: absolute;
            left: auto !important;
            right: 1.1rem !important;
            top: 50%;
            transform: translateY(-50%);
            color: #222222 !important;
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s ease;
            z-index: 10;
            pointer-events: auto;
            display: inline-block;
            width: 24px;
            height: 24px;
            text-align: center;
            line-height: 24px;
        }

        .login-toggle-senha:hover {
            color: #0d9488 !important;
        }

        .login-input.erro {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            margin-top: 0.5rem;
            box-shadow: 0 4px 14px rgba(13, 148, 136, 0.3);
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(13, 148, 136, 0.35);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-erro {
            display: none;
            background: #fef2f2;
            color: #dc2626;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            text-align: center;
            font-weight: 500;
            border: 1px solid #fecaca;
        }

        .login-erro.ativo {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .login-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--slate-200);
        }

        .login-footer p {
            font-size: 0.8rem;
            color: var(--slate-400);
        }

        /* Partículas decorativas */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(13, 148, 136, 0.15);
            animation: float 8s ease-in-out infinite;
        }

        .particle:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 70%;
            right: 10%;
            animation-delay: 2s;
            background: rgba(0, 166, 81, 0.1);
        }

        .particle:nth-child(3) {
            width: 60px;
            height: 60px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        @media (max-width: 768px) {
            .login-wrapper {
                padding: 0.75rem;
                max-width: 100%;
            }

            .login-card {
                padding: 2rem 1.25rem;
                border-radius: 20px;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .login-logo-icon {
                width: 52px;
                height: 52px;
            }

            .login-logo-icon i {
                font-size: 1.4rem;
            }

            .login-input {
                padding: 0.8rem 2.6rem 0.8rem 2.6rem;
                font-size: 0.95rem;
            }

            .login-btn {
                padding: 0.875rem;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem 1rem;
                border-radius: 16px;
            }

            .login-header {
                margin-bottom: 1.75rem;
            }

            .login-header h1 {
                font-size: 1.3rem;
            }

            .login-logo-icon {
                width: 48px;
                height: 48px;
                margin-bottom: 1rem;
            }

            .login-divider {
                margin-bottom: 1.25rem;
            }

            .login-grupo {
                margin-bottom: 1rem;
            }

            .login-input {
                padding: 0.75rem 2.4rem 0.75rem 2.4rem;
            }

            .login-footer {
                margin-top: 1.5rem;
                padding-top: 1rem;
            }

            .particle {
                display: none;
            }
        }
    </style>
    <script src="js/api-interceptor.js"></script>
</head>

<body>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo-icon">
                    <i class="fas fa-store"></i>
                </div>
                <h1>Painel Administrativo</h1>
            </div>

            <div class="login-divider">
                <span>Entrar</span>
            </div>

            <div class="login-erro" id="login-erro">
                E-mail ou senha incorretos.
            </div>

            <form id="login-form" onsubmit="return fazerLogin(event)">
                <div class="login-grupo">
                    <label for="email">E-mail</label>
                    <div class="login-input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="text" id="email" class="login-input" placeholder="Digite seu e-mail" required autocomplete="off">
                    </div>
                </div>

                <div class="login-grupo">
                    <label for="senha">Senha</label>
                    <div class="login-input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="senha" class="login-input" placeholder="Digite sua senha" required>
                        <i class="fas fa-eye login-toggle-senha" onclick="toggleSenha()" id="toggleSenha" title="Mostrar senha"></i>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>

            <div class="login-footer">
                <p>&copy; 2025</p>
            </div>
        </div>
    </div>

    <script>
        function toggleSenha() {
            const input = document.getElementById('senha');
            const icon = document.getElementById('toggleSenha');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
                icon.title = 'Ocultar senha';
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
                icon.title = 'Mostrar senha';
            }
        }


    </script>
    <script src="js/login.js"></script>
    <script src="js/empresa.js"></script>
</body>

</html>
